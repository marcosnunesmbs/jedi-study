services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_pass}
      MYSQL_DATABASE: ${DB_NAME:-jedi_study}
      MYSQL_USER: ${DB_USER:-jedi_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-jedi_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_pass}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  agents:
    build:
      context: ./apps/agents
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-pro}
      API_ORIGIN: http://api:3000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://${DB_USER:-jedi_user}:${DB_PASSWORD:-jedi_pass}@db:3306/${DB_NAME:-jedi_study}
      REDIS_URL: redis://redis:6379
      AGENTS_BASE_URL: http://agents:8000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 24h
      NODE_ENV: production
      API_PORT: 3000
    ports:
      - "3001:3000"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      agents:
        condition: service_healthy
    command: node dist/main

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5177:80"
    depends_on:
      - api

volumes:
  redis_data:
  mysql_data:
