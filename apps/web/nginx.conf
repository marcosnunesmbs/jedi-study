server {
    listen 80;
    server_name localhost;

    # Set the root directory for the application
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (global)
    # Note: These are overridden if a location block defines its own add_header
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Handle SPA routing by redirecting all non-file requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for index.html
    # Must re-include security headers due to add_header inheritance rules
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri /index.html;
    }

    # Disable caching for service worker
    # Must re-include security headers due to add_header inheritance rules
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Disable caching for registerSW.js
    location = /registerSW.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Disable caching for PWA manifest
    location = /manifest.webmanifest {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
    
    # Serve static assets with appropriate caching headers
    # Must re-include security headers due to add_header inheritance rules
    location ~* \.(js|jsx|css|png|svg|jpg|jpeg|gif|ico|ttf|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
}
